<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Movie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Movie Guessing Game</h1>
        
        <div id="start-screen">
            <button id="start-btn" class="btn">Start Game</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="movie-info">
                <p><strong>Year:</strong> <span id="movie-year"></span></p>
                <p><strong>Genre:</strong> <span id="movie-genre"></span></p>
            </div>

            <div class="display-name" id="display-name">
                </div>

            <div class="hint-container">
                <h3>Hint (Turn <span id="turn-display">1</span>/7):</h3>
                <p id="hint-text"></p>
            </div>

            <div class="guess-section">
                <input type="text" id="guess-input" placeholder="Enter movie name..." autocomplete="off">
                <button id="guess-btn" class="btn">Guess</button>
                <button id="giveup-btn" class="btn btn-danger">Give Up</button>
            </div>
            
            <p id="message" class="message"></p>
        </div>

        <div id="end-screen" class="hidden">
            <h2 id="end-title"></h2>
            <p>The movie was: <strong id="final-movie-name" class="highlight"></strong></p>
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const guessBtn = document.getElementById('guess-btn');
        const giveupBtn = document.getElementById('giveup-btn');
        const restartBtn = document.getElementById('restart-btn');
        const guessInput = document.getElementById('guess-input');
        
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        
        const displayName = document.getElementById('display-name');
        const movieYear = document.getElementById('movie-year');
        const movieGenre = document.getElementById('movie-genre');
        const hintText = document.getElementById('hint-text');
        const turnDisplay = document.getElementById('turn-display');
        const message = document.getElementById('message');
        
        const endTitle = document.getElementById('end-title');
        const finalMovieName = document.getElementById('final-movie-name');

        function startGame() {
            fetch('/api/start', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    startScreen.classList.add('hidden');
                    endScreen.classList.add('hidden');
                    gameScreen.classList.remove('hidden');
                    
                    movieYear.textContent = data.year;
                    movieGenre.textContent = data.genre;
                    displayName.textContent = data.display_name;
                    hintText.textContent = data.hint;
                    turnDisplay.textContent = data.turn;
                    
                    guessInput.value = '';
                    message.textContent = '';
                    guessInput.focus();
                });
        }

        function submitGuess() {
            const guess = guessInput.value.trim();
            if (!guess) return;
            
            fetch('/api/guess', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guess })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'win') {
                    showEndScreen(true, data.movie);
                } else if (data.status === 'lose') {
                    showEndScreen(false, data.movie);
                } else if (data.status === 'continue') {
                    displayName.textContent = data.display_name;
                    hintText.textContent = data.hint;
                    turnDisplay.textContent = data.turn;
                    message.textContent = 'Wrong guess, try again!';
                    message.style.color = '#ff6b6b';
                    guessInput.value = '';
                    guessInput.focus();
                }
            });
        }

        function giveUp() {
            fetch('/api/giveup', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    showEndScreen(false, data.movie);
                });
        }

        function showEndScreen(isWin, movie) {
            gameScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            finalMovieName.textContent = movie;
            
            if (isWin) {
                endTitle.textContent = '🎉 You Won! 🎉';
                endTitle.style.color = '#4ecdc4';
            } else {
                endTitle.textContent = '💀 Game Over 💀';
                endTitle.style.color = '#ff6b6b';
            }
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        guessBtn.addEventListener('click', submitGuess);
        giveupBtn.addEventListener('click', giveUp);
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitGuess();
        });
    </script>
</body>
</html>
